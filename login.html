<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Eventra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">
  <header class="site-header">
    <nav class="nav container">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">Eventra</span>
      </a>
      <div class="nav-actions">
        <a class="btn btn-ghost" href="index.html#markets">Markets</a>
        <a class="btn btn-ghost" href="account.html">Account</a>
        <a class="btn btn-primary" href="signup.html">Sign up</a>
      </div>
    </nav>
  </header>

  <main>
    <div class="auth-card">
      <h1>Log in</h1>
      <p class="sub">Sign in to your Eventra account.</p>

      <form class="auth-form" id="login-form" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" required autocomplete="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-submit" id="login-btn">Log in</button>
      </form>

      <div class="auth-message" id="login-message" role="alert"></div>
      <p class="auth-footer">
        Don’t have an account? <a href="signup.html">Sign up</a>
      </p>
    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    (function () {
      var form = document.getElementById("login-form");
      var btn = document.getElementById("login-btn");
      var msg = document.getElementById("login-message");

      function showMessage(text, type) {
        msg.textContent = text;
        msg.className = "auth-message show " + (type || "error");
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var email = document.getElementById("login-email").value.trim();
        var password = document.getElementById("login-password").value;
        if (!email || !password) {
          showMessage("Please enter email and password.");
          return;
        }
        btn.disabled = true;
        msg.className = "auth-message";
        EventraAuth.signIn(email, password)
          .then(function () {
            showMessage("Signed in. Redirecting…", "success");
            window.location.href = "account.html";
          })
          .catch(function (err) {
            if (err.code === "auth/configuration-not-found") {
              showMessage("Auth not set up. In Firebase Console: Build → Authentication → Get started, then enable Email/Password under Sign-in method.");
            } else {
              showMessage(err.message || "Login failed.");
            }
            btn.disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
